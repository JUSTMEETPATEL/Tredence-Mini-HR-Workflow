# HR Workflow Designer — Local Development Stack
# Usage: docker compose up --build
# PRD §5.5 — web:3000, api:4000, postgres:5432, nginx:80

services:
  # ── Nginx Reverse Proxy ──────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_started
      api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/nginx-health"]
      interval: 10s
      timeout: 3s
      retries: 3

  # ── Next.js Frontend ─────────────────────────
  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_MODE=real
      - NEXT_PUBLIC_API_BASE_URL=http://api:4000
      - HOSTNAME=0.0.0.0
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── Hono.js API ──────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - PORT=4000
      - DATABASE_URL=postgresql://hrflow:hrflow_dev@postgres:5432/hr_workflow
      - CORS_ORIGIN=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ───────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: hrflow
      POSTGRES_PASSWORD: hrflow_dev
      POSTGRES_DB: hr_workflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hrflow -d hr_workflow"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
    driver: local

