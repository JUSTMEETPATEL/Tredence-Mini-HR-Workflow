apiVersion: v1
kind: Service
metadata:
  name: web
  namespace: app
  labels:
    app: web
spec:
  type: ClusterIP
  selector:
    app: web
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: app
  labels:
    app: api
spec:
  type: ClusterIP
  selector:
    app: api
  ports:
    - port: 4000
      targetPort: 4000
      protocol: TCP
      name: http
---
apiVersion: v1
kind: Service
metadata:
  name: sanitizer
  namespace: ingress
  labels:
    app: sanitizer
spec:
  type: ClusterIP
  selector:
    app: sanitizer
  ports:
    - port: 5000
      targetPort: 5000
      protocol: TCP
      name: http
