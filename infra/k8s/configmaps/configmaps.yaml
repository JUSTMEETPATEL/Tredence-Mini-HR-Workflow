apiVersion: v1
kind: ConfigMap
metadata:
  name: web-config
  namespace: app
  labels:
    app: web
    project: hr-workflow-designer
data:
  API_MODE: "mock"
  API_BASE_URL: "http://api.app.svc.cluster.local:4000"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: ingress
  labels:
    app: nginx
    project: hr-workflow-designer
data:
  proxy-body-size: "10m"
  proxy-read-timeout: "60"
  proxy-send-timeout: "60"
  use-gzip: "true"
  gzip-types: "text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml"
